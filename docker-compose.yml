version: '3.8'

services:
  # --- Infrastructure ---
  db:
    image: cockroachdb/cockroach:v23.1.10
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - ./data/cockroach-data:/cockroach/cockroach-data

  kafka:
    image: bitnami/kafka:3.5
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - ./data/kafka-data:/bitnami/kafka

  gateway:
    image: envoyproxy/envoy:v1.26-latest
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "80:10000"
      - "9901:9901"

  # --- Microservices ---
  order-service:
    build: ./microservices/order-service
    depends_on:
      - db
      - kafka
    environment:
      - DB_URL=postgresql://root@db:26257/defaultdb
      - KAFKA_BROKERS=kafka:9092

  user-service:
    build: ./microservices/user-service
    depends_on:
      - db

  notification-service:
    build: ./microservices/notification-service
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:9092
