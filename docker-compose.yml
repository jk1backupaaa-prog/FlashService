services:
  # --- Infrastructure ---
  db:
    image: cockroachdb/cockroach:v23.1.10
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - ./data/cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?type=ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    image: cockroachdb/cockroach:v23.1.10
    volumes:
      - ./db/init.sql:/init.sql
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c", "cockroach sql --insecure --host=db -e \"$(cat /init.sql)\""]

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Creating Kafka topics..."
        kafka-topics.sh --create --if-not-exists --topic order.created --partitions 3 --replication-factor 1 --bootstrap-server kafka:9093
        kafka-topics.sh --create --if-not-exists --topic notification --partitions 3 --replication-factor 1 --bootstrap-server kafka:9093
        kafka-topics.sh --create --if-not-exists --topic inventory.updated --partitions 3 --replication-factor 1 --bootstrap-server kafka:9093
        echo "Topics created."
        kafka-topics.sh --bootstrap-server kafka:9093 --list

  gateway:
    image: envoyproxy/envoy:v1.26-latest
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "80:10000"
      - "9901:9901"

  # --- Microservices ---
  order-service:
    build: ./microservices/order-service
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - DB_URL=postgresql://root@db:26257/defaultdb?sslmode=disable
      - KAFKA_BROKERS=kafka:9093

  user-service:
    build: ./microservices/user-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=postgresql://root@db:26257/defaultdb?sslmode=disable

  notification-service:
    build: ./microservices/notification-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BROKERS=kafka:9093
      - KAFKA_TOPIC=notification
