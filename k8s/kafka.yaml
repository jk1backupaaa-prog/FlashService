apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: flashservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.2.0
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENERS
              value: "CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "HOST://localhost:9092,PLAINTEXT://kafka.flashservice.svc.cluster.local:9093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9091"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - kafka-broker-api-versions.sh --bootstrap-server localhost:9092
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: flashservice
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9093
      targetPort: 9093
    - name: host
      port: 9092
      targetPort: 9092
  type: ClusterIP
